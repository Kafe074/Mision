name: Rotacion Mensual de Claves
on:
  schedule:
    - cron: '0 0 1 * *' # Se ejecuta a las 00:00 el día 1 de cada mes
  workflow_dispatch: # Esto permite que tú lo actives manualmente para probar

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          pip install requests firebase-admin

      - name: Ejecutar script de rotacion
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/rotate_keys.py

      - name: Guardar cambios en la web
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add login.html
          git commit -m "Seguridad: Rotación automática de clave pública [skip ci]"
          git push