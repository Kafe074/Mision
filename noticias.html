<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avances de la Misión | Luz en Malasia</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500&family=Montserrat:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="photos/favicon.png">

    <style>
        .news-container {
            max-width: 900px;
            /* Un poco más ancho para el diseño lado a lado */
            margin: 40px auto;
            padding: 0 20px;
            min-height: 70vh;
        }

        /* --- DISEÑO LADO A LADO --- */
        .news-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 40px;
            border-left: 5px solid var(--dorado-luz);
            transition: transform 0.3s ease;
            display: flex;
            /* Activa el diseño flexible */
            gap: 25px;
            /* Espacio entre imagen y texto */
            align-items: flex-start;
        }

        .news-card:hover {
            transform: translateY(-5px);
        }

        /* Contenedor de imagen a la izquierda */
        .news-img-wrapper {
            flex: 0 0 35%;
            /* La imagen ocupa el 35% del ancho fijo */
            max-width: 350px;
        }

        .news-img {
            width: 100%;
            height: 250px;
            /* Altura fija para uniformidad */
            border-radius: 10px;
            object-fit: cover;
            display: block;
            background: #f0f0f0;
            /* Color de fondo mientras carga */
        }

        /* Contenedor de texto a la derecha */
        .news-info {
            flex: 1;
            /* El texto toma el resto del espacio */
        }

        .news-card h3 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--verde-selva);
            font-size: 1.8rem;
            margin: 5px 0 10px 0;
            line-height: 1.2;
        }

        .news-date {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .news-content {
            line-height: 1.6;
            color: #444;
            white-space: pre-wrap;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
        }

        /* --- EFECTO ESQUELETO (SKELETON) --- */
        .skeleton {
            background: #eee;
            background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            border-radius: 8px;
            background-size: 200% 100%;
            animation: 1.5s shine linear infinite;
        }

        @keyframes shine {
            to {
                background-position-x: -200%;
            }
        }

        .skeleton-card {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            padding: 25px;
        }

        /* Responsivo: En móviles vuelve a estar uno arriba del otro */
        @media (max-width: 768px) {
            .news-card {
                flex-direction: column;
            }

            .news-img-wrapper {
                flex: 0 0 100%;
                max-width: 100%;
            }

            .news-img {
                height: auto;
                max-height: 300px;
            }
        }

        .page-title {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            color: var(--verde-selva);
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <span class="luz">LUZ</span> <span class="en-italic">en</span> MALASIA
        </div>
        <button class="menu-toggle" id="mobile-menu">
            <i class="fa-solid fa-bars"></i>
        </button>
        <nav id="nav-menu">
            <a href="inicio.html">Inicio</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="noticias.html" class="active">Noticias</a>
            <a href="malasia.html">Malasia</a>
            <a href="https://www.purecharity.com/checkout/603636" target="_blank" class="btn-nav">Apoyar</a>
        </nav>
    </header>

    <div class="news-container">
        <h1 class="page-title">Bitácora de la Misión</h1>
        <p style="text-align: center; margin-bottom: 40px; color: #666;">Noticias y actualizaciones desde el campo
            misionero.</p>

        <div id="contenedor-noticias">
            <div class="skeleton-card">
                <div class="skeleton" style="width: 35%; height: 200px;"></div>
                <div style="flex: 1;">
                    <div class="skeleton" style="width: 30%; height: 15px; margin-bottom: 15px;"></div>
                    <div class="skeleton" style="width: 80%; height: 30px; margin-bottom: 15px;"></div>
                    <div class="skeleton" style="width: 100%; height: 80px;"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mini-footer">
        <p>&copy; 2026 Familia Cusilayme Muñasqui | Luz en Malasia</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAHvLHGr4pXiXhiWhEJegW6nJUlWxiVfA",
            authDomain: "sudesteasiatico-5a1d2.firebaseapp.com",
            projectId: "sudesteasiatico-5a1d2",
            storageBucket: "sudesteasiatico-5a1d2.firebasestorage.app",
            messagingSenderId: "88193105907",
            appId: "1:88193105907:web:ba8953331fec95abd6dc86"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function cargarNoticias() {
            const container = document.getElementById("contenedor-noticias");

            try {
                const q = query(collection(db, "noticias"), orderBy("fecha", "desc"));
                const querySnapshot = await getDocs(q);

                container.innerHTML = "";

                if (querySnapshot.empty) {
                    container.innerHTML = `<div class="empty-state">Próximamente compartiremos las maravillas que Dios está haciendo en Malasia.</div>`;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();

                    const fecha = data.fecha ? data.fecha.toDate().toLocaleDateString('es-ES', {
                        day: 'numeric', month: 'long', year: 'numeric'
                    }) : "Reciente";

                    // Optimización: Lazy Loading nativo para imágenes
                    const fotoHTML = data.imagenUrl ?
                        `<div class="news-img-wrapper">
                            <img src="${data.imagenUrl}" alt="${data.titulo}" class="news-img" loading="lazy">
                         </div>` : "";

                    container.innerHTML += `
                        <article class="news-card">
                            ${fotoHTML}
                            <div class="news-info">
                                <div class="news-date">${fecha}</div>
                                <h3>${data.titulo}</h3>
                                <div class="news-content">${data.contenido}</div>
                            </div>
                        </article>
                    `;
                });
            } catch (error) {
                console.error("Error:", error);
                container.innerHTML = `<p class="empty-state">Error al cargar las noticias.</p>`;
            }
        }

        cargarNoticias();
    </script>
</body>

</html>
