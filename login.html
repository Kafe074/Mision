<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Acceso Privado | Luz en el Sudeste Asiatico</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@400&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="photos/favicon.png">
    <link rel="apple-touch-icon" href="photos/favicon.png">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f9f7f2;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            border-top: 5px solid #D4AF37;
        }

        h2 {
            font-family: 'Cormorant Garamond', serif;
            color: #1B4332;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: center;
        }

        button {
            background: #1B4332;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background: #D4AF37;
        }

        .warning {
            font-size: 0.75rem;
            color: #999;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <div style="letter-spacing: 3px; color: #D4AF37; font-weight: bold; margin-bottom: 10px;">LUZ EN EL SUDESTE
            ASIATICO</div>
        <h2>Espacio Reservado</h2>
        <p>Este sitio contiene información sensible sobre la misión en el SE Asia. Por seguridad, se requiere una clave
            de acceso actualizada.</p>

        <input type="password" id="passInput" placeholder="Contraseña de temporada">
        <button onclick="validar()">Ingresar</button>

        <p id="errorMsg" style="color: #c0392b; display: none; margin-top: 15px;">Clave incorrecta o caducada.</p>

        <div class="warning">
            Si no tienes la clave actual, solicítala a través de nuestra contacto personal.
        </div>
    </div>

    <script>
        async function validar() {
            const pass = document.getElementById("passInput").value;
            const errorMsg = document.getElementById("errorMsg");

            async function hash(string) {
                const utf8 = new Uint8Array(Array.from(string).map(c => c.charCodeAt(0)));
                const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            const inputHash = await hash(pass);

            // DICCIONARIO DE CLAVES ENCRIPTADAS
            const clavesAutorizadas = [
                "6086f0853400a4980667da6724641c88825f38713291249b67323b6f0019448a", // Corresponde a: mision.luz.2026
                "103328e35243171120092c20609355f37554f6551b88e146740b284898335032", // Corresponde a: familia.filio.asia
            /* PUBLIC_KEY */ "b811d4b543f5b4400f23c53d9aca8a43ecae5793faee3cb4fc2a004215347040"
            ];

            if (clavesAutorizadas.includes(inputHash)) {
                // TIEMPO DE SESIÓN: 20 MINUTOS (20 min * 60 seg * 1000 ms)
                const tiempoExpiracion = 20 * 60 * 1000;
                const expira = new Date().getTime() + tiempoExpiracion;

                localStorage.setItem("session_filio", expira);
                window.location.href = "index.html";
            } else {
                errorMsg.style.display = "block";
                errorMsg.innerText = "Clave incorrecta o caducada.";
            }
        }

        // Permitir entrar con la tecla "Enter"
        document.getElementById("passInput").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                validar();
            }
        });
    </script>
</body>

</html>
