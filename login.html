<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Acceso Privado | Luz en el Sudeste Asiatico</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@400&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f9f7f2;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            border-top: 5px solid #D4AF37;
        }

        h2 {
            font-family: 'Cormorant Garamond', serif;
            color: #1B4332;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: center;
        }

        button {
            background: #1B4332;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background: #D4AF37;
        }

        .warning {
            font-size: 0.75rem;
            color: #999;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <div style="letter-spacing: 3px; color: #D4AF37; font-weight: bold; margin-bottom: 10px;">LUZ EN EL SUDESTE ASIATICO</div>
        <h2>Espacio Reservado</h2>
        <p>Este sitio contiene información sensible sobre la misión en el SE Asia. Por seguridad, se requiere una clave
            de acceso actualizada.</p>

        <input type="password" id="passInput" placeholder="Contraseña de temporada">
        <button onclick="validar()">Ingresar</button>

        <p id="errorMsg" style="color: #c0392b; display: none; margin-top: 15px;">Clave incorrecta o caducada.</p>

        <div class="warning">
            Si no tienes la clave actual, solicítala a través de nuestra contacto personal.
        </div>
    </div>

    <script>
        function validar() {
            const pass = document.getElementById("passInput").value;
            // CLAVE DE TEMPORADA (Cámbiala aquí cada 3 meses)
            const claveActual = "Malasia2026_Marzo";

            if (pass === claveActual) {
                // Crea una marca de tiempo para que la sesión dure, por ejemplo, 24 horas
                const expira = new Date().getTime() + (24 * 60 * 60 * 1000);
                localStorage.setItem("session_filio", expira);
                window.location.href = "index.html";
            } else {
                document.getElementById("errorMsg").style.display = "block";
            }
        }
    </script>
</body>

</html>
