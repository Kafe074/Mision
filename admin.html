<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Luz en el Sudeste Asiático</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="photos/favicon.png">
    <link rel="apple-touch-icon" href="photos/favicon.png">
    <style>
        :root {
            --verde: #1B4332;
            --dorado: #D4AF37;
            --crema: #f9f7f2;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--crema);
            margin: 0;
            color: #333;
            padding: 20px;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--crema);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 350px;
            width: 90%;
            border-top: 5px solid var(--dorado);
        }

        /* Main Layout */
        .container {
            max-width: 900px;
            margin: 0 auto;
            display: none;
        }

        h1,
        h2 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--verde);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        .section-title {
            border-bottom: 2px solid var(--dorado);
            display: inline-block;
            margin-bottom: 20px;
            padding-right: 20px;
        }

        /* Cards & Lists */
        .grid {
            display: grid;
            gap: 20px;
            margin-bottom: 50px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info strong {
            color: var(--verde);
            display: block;
            font-size: 1.1rem;
        }

        .info span {
            font-size: 0.85rem;
            color: #666;
        }

        /* Buttons */
        input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            background: var(--verde);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        button:hover {
            background: var(--dorado);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #c0392b;
        }

        .btn-danger:hover {
            background: #a93226;
        }

        @media (max-width: 600px) {
            .card {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
        }
    </style>
</head>

<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2>Panel Administrativo</h2>
            <p>Ingresa la contraseña maestra</p>
            <input type="password" id="adminPass" placeholder="Contraseña">
            <button onclick="verificarAdmin()">Entrar</button>
        </div>
    </div>

    <div class="container" id="adminContent">
        <div style="text-align: center; margin-bottom: 20px;">
            <div style="letter-spacing: 3px; color: var(--dorado); font-weight: bold;">LUZ EN EL SUDESTE ASIÁTICO</div>
        </div>
        <h1>Gestión de Misión</h1>

        <h2 class="section-title">Solicitudes Pendientes</h2>
        <div id="lista-pendientes" class="grid">Cargando...</div>

        <h2 class="section-title">Usuarios con Acceso</h2>
        <div id="lista-aprobados" class="grid">Cargando...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAHvLHGr4pXiXhiWhEJegW6nJUlWxiVfA",
            authDomain: "sudesteasiatico-5a1d2.firebaseapp.com",
            projectId: "sudesteasiatico-5a1d2",
            storageBucket: "sudesteasiatico-5a1d2.firebasestorage.app",
            messagingSenderId: "88193105907",
            appId: "1:88193105907:web:ba8953331fec95abd6dc86"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SEGURIDAD ---
        window.verificarAdmin = async () => {
            const pass = document.getElementById("adminPass").value.trim();

            // Generamos el hash SHA-256
            const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
            const inputHash = Array.from(new Uint8Array(hashBuffer))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');

            // Única contraseña autorizada: FilioRojas1917
            const hashMaestro = "5571f3c746c7ac2f33ed941b5af96e2a8ff83357fa95b13084e99d5f99eda979";

            if (inputHash === hashMaestro) {
                document.getElementById("login-overlay").style.display = "none";
                document.getElementById("adminContent").style.display = "block";
                cargarDatos();
            } else {
                alert("Contraseña administrativa incorrecta");
            }
        };

        // --- CARGAR DATOS ---
        async function cargarDatos() {
            cargarLista("pendiente", "lista-pendientes");
            cargarLista("aprobado", "lista-aprobados");
        }

        async function cargarLista(estado, elementId) {
            const contenedor = document.getElementById(elementId);
            contenedor.innerHTML = "Actualizando...";

            const q = query(collection(db, "solicitudes"), where("estado", "==", estado));
            const snap = await getDocs(q);

            contenedor.innerHTML = "";
            if (snap.empty) {
                contenedor.innerHTML = `<p style="color:#999">No hay registros en esta categoría.</p>`;
                return;
            }

            snap.forEach(docSnap => {
                const u = docSnap.data();
                const div = document.createElement("div");
                div.className = "card";

                if (estado === "pendiente") {
                    div.innerHTML = `
                        <div class="info">
                            <strong>${u.nombre}</strong>
                            <span>${u.correo} | ${u.telefono}</span>
                        </div>
                        <button onclick="aprobar('${docSnap.id}', '${u.correo}', '${u.nombre}')">Aprobar Acceso</button>
                    `;
                } else {
                    // SECCIÓN ACTUALIZADA: Ahora muestra correo y teléfono también en aprobados
                    div.innerHTML = `
                        <div class="info">
                            <strong>${u.nombre}</strong>
                            <span>${u.correo} | ${u.telefono}</span>
                            <br>
                            <small style="color: #999;">Aprobado el: ${u.fecha || 'Reciente'}</small>
                        </div>
                        <button class="btn-danger" onclick="eliminar('${docSnap.id}')">Revocar Acceso</button>
                    `;
                }
                contenedor.appendChild(div);
            });
        }

        // --- ACCIONES ---
        window.aprobar = async (id, correo, nombre) => {
            if (!confirm(`¿Aprobar a ${nombre}?`)) return;
            try {
                const configSnap = await getDoc(doc(db, "config", "acceso"));
                const claveActual = configSnap.data().clave_mensual;

                await addDoc(collection(db, "correos_enviados"), {
                    to: correo,
                    message: {
                        subject: "🔑 Acceso Concedido - Luz en el Sudeste Asiático",
                        html: `
                        <div style="font-family: sans-serif; max-width: 500px; border: 1px solid #eee; padding: 20px; border-radius: 10px;">
                            <h2 style="color: #1B4332;">¡Hola ${nombre}!</h2>
                            <p>Tu solicitud ha sido aprobada. Aquí tienes tu clave de temporada:</p>
                            <div style="background: #f9f7f2; padding: 20px; text-align: center; border: 1px dashed #D4AF37;">
                                <span style="font-size: 24px; font-weight: bold; letter-spacing: 4px; color: #1B4332;">${claveActual}</span>
                            </div>
                            <p style="font-size: 12px; color: #777; margin-top: 20px;">Este código es personal. Dios te bendiga.</p>
                        </div>`
                    }
                });

                await updateDoc(doc(db, "solicitudes", id), {
                    estado: "aprobado",
                    fecha: new Date().toLocaleDateString()
                });

                cargarDatos();
            } catch (e) { alert("Error: " + e.message); }
        };

        window.eliminar = async (id) => {
            if (confirm("¿Seguro que deseas revocar el acceso y eliminar a este usuario de la lista?")) {
                await deleteDoc(doc(db, "solicitudes", id));
                cargarDatos();
            }
        };

    </script>
</body>

</html>
